# docker-compose.yml — 배포용 (Lightsail 4GB)
# Usage:
#   docker compose up -d          # 전체 기동
#   docker compose down           # 전체 정지
#   docker compose down -v        # 정지 + 볼륨 삭제 (초기화)
#   docker compose logs -f        # 로그 확인

services:
  # ── Nginx (리버스 프록시, 80 단일 URL) ────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: daiso-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - daiso-net

  # ── Frontend (Next.js) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: daiso-frontend
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - daiso-net

  # ── Backend (FastAPI) ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: daiso-backend
    expose:
      - "8000"
    env_file:
      - .env.production
    environment:
      - ELASTIC_URL=http://elasticsearch:9200
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
    volumes:
      # Google STT 서비스 계정 JSON (호스트에서 마운트)
      - ./credentials:/app/credentials:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - daiso-net

  # ── Elasticsearch (BM25 검색) ────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: daiso-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - cluster.name=daiso-search
    # 내부 통신만, 외부 공개 안 함
    expose:
      - "9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s
    restart: unless-stopped
    networks:
      - daiso-net

  # ── Qdrant (Vector 검색) ─────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.7
    container_name: daiso-qdrant
    # 내부 통신만, 외부 공개 안 함
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 10s
    restart: unless-stopped
    networks:
      - daiso-net

  # ── Redis (캐시/세션) ────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: daiso-redis
    # 내부 통신만, 외부 공개 안 함
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - daiso-net

volumes:
  es_data:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local

networks:
  daiso-net:
    driver: bridge
