# docker-compose.yml
# M1: Hybrid Search Infrastructure
# Usage:
#   docker compose up -d          # Start all infra services
#   docker compose down           # Stop all
#   docker compose down -v        # Stop + remove volumes (clean reset)

services:
  # ── Elasticsearch (BM25 검색) ──────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: daiso-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=daiso-search
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - daiso-net

  # ── Qdrant (Vector 검색) ───────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.7
    container_name: daiso-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - daiso-net

  # ── Redis (캐시/세션) ──────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: daiso-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - daiso-net

volumes:
  es_data:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local

networks:
  daiso-net:
    driver: bridge
