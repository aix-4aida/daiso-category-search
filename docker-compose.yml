version: '3.8'

services:
  frontend:
    # Build from the frontend directory using the new Dockerfile
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # Image name for Docker Hub (Replace 'your-dockerhub-username' with actaul username)
    image: ${DOCKER_USERNAME:-daiso-user}/daiso-frontend:latest
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000 # On EC2, this might need to be the public IP or domain
    depends_on:
      - backend
    restart: always

  backend:
    # Build from root context
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME:-daiso-user}/daiso-backend:latest
    ports:
      - "8000:8000"
    volumes:
      # Mount data volume for persistence (adjust as needed for production)
      - ./backend/services_kms/data:/app/services_kms/data
    environment:
      - QDRANT_URL=http://qdrant:6333
      - ELASTIC_URL=http://elasticsearch:9200
    depends_on:
      - qdrant
      - elasticsearch
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: always

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ./es_data:/usr/share/elasticsearch/data
    restart: always
