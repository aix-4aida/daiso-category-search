version: '3.8'

services:
  # [1] 파이썬 백엔드
  backend:
    build: .
    container_name: daiso-backend
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - elasticsearch
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - ELASTIC_URL=http://elasticsearch:9200
    volumes:
      - ./backend/database:/app/backend/database
    restart: always

  # [2] Next.js 프론트엔드 (키오스크)
  frontend:
    build: ./frontend-next
    container_name: daiso-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

  # [3] 큐드런트 (벡터 DB)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: daiso-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: always

  # [4] 엘라스틱서치 (검색 엔진)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
    container_name: daiso-elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - ./es_data:/usr/share/elasticsearch/data
    restart: always
