<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어디다있소 - 다이소 매장 상품찾기</title>
    <meta name="description" content="다이소 매장 내 상품 위치를 음성/텍스트로 찾아주는 스마트 키오스크 서비스">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzNiAzNiIgd2lkdGg9IjM2IiBoZWlnaHQ9IjM2Ij4KICA8cmVjdCB4PSIwIiB5PSIwIiB3aWR0aD0iMzYiIGhlaWdodD0iMzYiIHJ4PSI4IiBmaWxsPSIjRTUwMDAwIiAvPgogIDx0ZXh0IHg9IjE4IiB5PSIyMi41IiBmb250LWZhbWlseT0iLWFwcGxlLXN5c3RlbSwgQmxpbmtNYWNTeXN0ZW1Gb250LCAnU2Vnb2UgVUknLCBSb2JvdG8sIEhlbHZldGljYSwgQXJpYWwsIHNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMTAiIGZvbnQtd2VpZ2h0PSJib2xkIiBmaWxsPSIjRkZGRkZGIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBsZXR0ZXItc3BhY2luZz0iLTAuNSI+RGFpc288L3RleHQ+Cjwvc3ZnPgo=">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <a href="index.html" class="header-logo">
            <div class="logo-icon"><span>Daiso</span></div>
            <div class="logo-text">
                <img src="images/logo.png" alt="어디다있소" style="height: 46px; margin-left: 8px;">
            </div>
        </a>

        <!-- Top Fixed Search Bar -->
        <div class="top-search-container">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="어떤 상품의 위치를 알고 싶으세요?"
                    onkeypress="if(event.key==='Enter') doSearch()">
                <svg class="search-icon" viewBox="0 0 24 24" onclick="doSearch()">
                    <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" />
                </svg>
            </div>
        </div>

        <div class="header-right">
            <div class="lang-toggle">
                <span class="active">KOR</span> / <span>ENG</span>
            </div>
            <button class="help-btn" onclick="showHelp()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                도움말
            </button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="main-content">

        <!-- HOME VIEW (default) -->
        <div id="view-home">
            <!-- Voice Search -->
            <section class="voice-section" style="margin-top: 5vh; margin-bottom: 5vh;">
                <button class="mic-button" id="mic-btn" onclick="toggleVoice()">
                    <div class="mic-ripple"></div>
                    <div class="mic-ripple"></div>
                    <div class="mic-ripple"></div>
                    <svg viewBox="0 0 24 24">
                        <path d="M12 1a4 4 0 00-4 4v6a4 4 0 008 0V5a4 4 0 00-4-4z" />
                        <path d="M19 10v1a7 7 0 01-14 0v-1M12 18.5v3M8 21.5h8" fill="none" stroke="white"
                            stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>
                <p class="voice-label">어떤 상품의 위치를 알고 싶으세요?</p>
            </section>

            <!-- Carousel / Banner -->
            <section class="carousel-section">
                <div class="carousel-track" id="carousel-track">
                    <!-- Slide 1: 오늘의 추천 상품 -->
                    <div class="carousel-slide">
                        <div class="banner-card">
                            <div class="banner-text">
                                <h2>오늘의 추천 상품</h2>
                                <p>다이소는 특요한 추천 상품</p>
                            </div>
                            <div class="banner-products" id="recommended-products">
                                <!-- Populated dynamically from /api/recommended -->
                            </div>
                        </div>
                    </div>
                    <!-- Slide 2 -->
                    <div class="carousel-slide">
                        <div class="banner-card" style="background: linear-gradient(135deg, #ffe8ec 0%, #ffd1d9 100%);">
                            <div class="banner-text">
                                <h2>SPRING PROMOTION</h2>
                                <p>New Arrivals & Special Offers</p>
                                <p style="font-size:20px;font-weight:700;margin-top:12px;">Visit Us Today!</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="carousel-dots">
                    <div class="dot active" onclick="goToSlide(0)"></div>
                    <div class="dot" onclick="goToSlide(1)"></div>
                </div>
            </section>

            <!-- Search Bar (text fallback - removed duplicate search bar inside the view to prefer top header) -->
        </div>

        <!-- LOADING VIEW -->
        <div id="view-loading" class="hidden">
            <div class="loading-screen">
                <div class="progress-ring-container">
                    <svg class="progress-ring" width="200" height="200">
                        <circle class="bg" cx="100" cy="100" r="90" />
                        <circle class="fill" id="progress-fill" cx="100" cy="100" r="90" />
                    </svg>
                    <div class="progress-percent" id="progress-text">0%</div>
                </div>
                <div style="font-size:48px;margin-top:-20px;color:#E50000;font-weight:800;">D</div>
                <p class="loading-text">상품을 찾는 중...</p>
                <div class="loading-query" id="loading-query">검색어</div>
            </div>
        </div>

        <!-- RESULTS VIEW -->
        <div id="view-results" class="hidden results-page">
            <div class="results-panel" id="results-panel">
                <h2 class="results-title" id="results-count">검색 결과 0개</h2>
                <div id="results-list"></div>
            </div>

            <div class="map-panel" id="map-panel">
                <!-- Map will be rendered here by JS -->
            </div>

            <div class="side-panel">
                <div class="qr-section">
                    <h4>스마트폰으로 스캔</h4>
                    <div id="qr-area"
                        style="width:140px;height:140px;margin:10px auto 20px;display:flex;align-items:center;justify-content:center;">
                    </div>
                    <button class="kakao-btn">
                        <div class="kakao-logo-bubble">TALK</div>
                        카카오로 보내기
                    </button>
                </div>
            </div>
        </div>

        <!-- CATEGORY MAP VIEW -->
        <div id="view-category" class="hidden category-page">
            <div class="category-map-area"
                style="display: flex; flex-direction: row; gap: 20px; width: 100%; align-items: stretch;">
                <div class="floor-map" id="floor-b1" style="flex: 1 1 50%; min-width: 0;">
                    <div class="floor-label">B1</div>
                    <div class="floor-title">B1 Floor</div>
                    <div class="category-map-container" id="map-b1"></div>
                </div>
                <div class="floor-map" id="floor-b2" style="flex: 1 1 50%; min-width: 0;">
                    <div class="floor-label">B2</div>
                    <div class="floor-title">B2 Floor</div>
                    <div class="category-map-container" id="map-b2"></div>
                </div>
            </div>
            <div class="category-sidebar" id="category-sidebar">
                <button class="cat-filter-btn" data-cat="시즌">🪴 시즌</button>
                <button class="cat-filter-btn" data-cat="뷰티">💄 뷰티</button>
                <button class="cat-filter-btn" data-cat="건강">💊 건강</button>
                <button class="cat-filter-btn" data-cat="캐릭터">🧸 캐릭터</button>
                <button class="cat-filter-btn" data-cat="패션">🧣 패션</button>
                <button class="cat-filter-btn" data-cat="문구">✏️ 문구</button>
                <button class="cat-filter-btn" data-cat="파티">🥳 파티</button>
                <button class="cat-filter-btn" data-cat="포장">🎁 포장</button>
                <button class="cat-filter-btn" data-cat="디지털">📱 디지털</button>
                <button class="cat-filter-btn" data-cat="인테리어">🏠 인테리어</button>
                <button class="cat-filter-btn" data-cat="식품">🍱 식품</button>
                <button class="cat-filter-btn" data-cat="욕실">🛁 욕실</button>
                <button class="cat-filter-btn" data-cat="청소">🧹 청소</button>
                <button class="cat-filter-btn" data-cat="수납정리">📦 수납정리</button>
                <button class="cat-filter-btn" data-cat="득템">🏆 득템</button>
                <button class="cat-filter-btn" data-cat="일본수입">🌸 일본수입</button>
                <button class="cat-filter-btn" data-cat="자연">🌿 자연</button>
                <button class="cat-filter-btn" data-cat="공구">🔧 공구</button>
                <button class="cat-filter-btn" data-cat="주방">🍳 주방</button>
                <button class="cat-filter-btn" data-cat="스포츠">⚽ 스포츠</button>
                <button class="cat-filter-btn" data-cat="애견">🐶 애견</button>
                <button class="cat-filter-btn" data-cat="수예">🧶 수예</button>
                <button class="cat-filter-btn" data-cat="캠핑">🏕️ 캠핑</button>
                <button class="cat-filter-btn" data-cat="여행">✈️ 여행</button>
                <button class="cat-filter-btn" data-cat="원예">🌻 원예</button>
            </div>
        </div>

    </main>

    <!-- BOTTOM TAB BAR -->
    <nav class="tab-bar">
        <button class="tab-item" data-tab="home" onclick="location.href='index.html'">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg>
            홈
        </button>
        <button class="tab-item active" data-tab="location" onclick="location.href='location.html'">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
            </svg>
            상품위치찾기
        </button>
        <button class="tab-item" data-tab="category" onclick="location.href='category.html'">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" />
            </svg>
            카테고리구역찾기
        </button>
        <button class="tab-item" data-tab="map" onclick="location.href='map.html'">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z" />
            </svg>
            매장배치도
        </button>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="js/app.js?v=51"></script>
    <script src="js/search.js?v=51"></script>
    <script src="js/map.js?v=51"></script>
    <script src="js/categories.js?v=51"></script>
    <script src="js/idle-timer.js"></script>
    <script>
        // Load recommended products from DB
        fetch('/api/recommended')
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('recommended-products');
                if (!container || !data.products || data.products.length === 0) return;
                container.innerHTML = data.products.map(p => `
                    <div class="product-thumb">
                        <img src="${p.image}" alt="${p.name}"
                             style="width:100%;height:100px;object-fit:cover;border-radius:8px;background:#f5f5f5;"
                             onerror="this.style.display='none'">
                        <div style="font-size:12px;color:#333;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name}</div>
                        <div class="price-tag">
                            <span class="category">국민득템</span>
                            <span class="price">${p.price.toLocaleString()}원</span>
                        </div>
                    </div>
                `).join('');
            })
            .catch(() => { });
    </script>
</body>

</html>
