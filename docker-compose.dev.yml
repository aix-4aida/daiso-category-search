# docker-compose.dev.yml — 로컬 개발용 (인프라만)
# FE/BE는 호스트에서 직접 실행, 인프라(ES/Qdrant/Redis)만 Docker로 띄움
#
# 사용법:
#   docker compose -f docker-compose.dev.yml up -d
#   cd frontend && npm run dev          # http://localhost:3000
#   cd backend && uvicorn main:app --host 0.0.0.0 --port 8000 --reload

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: daiso-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=daiso-search
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - daiso-net

  qdrant:
    image: qdrant/qdrant:v1.9.7
    container_name: daiso-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - daiso-net

  redis:
    image: redis:7.2-alpine
    container_name: daiso-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - daiso-net

volumes:
  es_data:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local

networks:
  daiso-net:
    driver: bridge
