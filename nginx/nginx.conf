upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name daisoitemfinder.shop www.daisoitemfinder.shop;

    client_max_body_size 10M;

    # Let's Encrypt 검증파일 제공
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # (임시) HTTP에서도 일단 서비스 보이게 프록시 유지
    location / {
      return 301 https://$host$request_uri;
    }
}
    
# ----- HTTPS(443): 실제 서비스 -----
server {
  listen 443 ssl;
  server_name daisoitemfinder.shop www.daisoitemfinder.shop;

  ssl_certificate     /etc/letsencrypt/live/daisoitemfinder.shop/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/daisoitemfinder.shop/privkey.pem;

  client_max_body_size 10M;

  location / {
    proxy_pass http://frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://backend/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }
}