server {
    listen 80;
    server_name kmins.store www.kmins.store;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://kmins.store$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.kmins.store;

    ssl_certificate /etc/letsencrypt/live/kmins.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kmins.store/privkey.pem;

    return 301 https://kmins.store$request_uri;
}

server {
    listen 443 ssl;
    server_name kmins.store;

    ssl_certificate /etc/letsencrypt/live/kmins.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kmins.store/privkey.pem;
    
    # 보안 권장 설정 (나중에 주석 해제하여 사용 가능)
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}
