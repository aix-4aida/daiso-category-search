name: Deploy to AWS Lightsail

on:
  push:
    branches: [ "main", "feature/kms" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/daiso-frontend:latest

    - name: Build and push Backend
      uses: docker/build-push-action@v4
      with:
        context: .
        file: Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/daiso-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Lightsail
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        timeout: 60m
        command_timeout: 60m
        script: |
          # Navigate to project director
          cd ~/daiso-category-search || git clone https://github.com/${{ github.repository }} ~/daiso-category-search
          cd ~/daiso-category-search
          
          # Fix: Install standalone docker-compose v2 to avoid "KeyError: ContainerConfig" in old v1
          mkdir -p ~/.local/bin
          if [ ! -f ~/.local/bin/docker-compose ]; then
              echo "Installing docker-compose v2..."
              curl -SL "https://github.com/docker/compose/releases/download/v2.24.6/docker-compose-linux-x86_64" -o ~/.local/bin/docker-compose
              chmod +x ~/.local/bin/docker-compose
          fi
          export PATH=$HOME/.local/bin:$PATH
          echo "Using docker-compose version: $(docker-compose --version)"

          # Pull latest code (for docker-compose.yml updates)
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull origin ${{ github.ref_name }}
          
          # Sets env var for docker-compose (using the secret username)
          export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          
          # Pull new images (Only downloads changed layers: Faster!)
          docker-compose pull
          
          # Restart containers
          docker-compose up -d --remove-orphans
          
          # Cleanup ONLY dangling images (Old versions)
          # We do NOT use 'system prune -a' anymore to keep cache for next deploy
          docker image prune -f
